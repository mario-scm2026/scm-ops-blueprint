version: '3.8'

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/scm-backend:${VERSION:-latest}
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=stage
      - PORT=3000
      - APP_VERSION=${VERSION:-0.1.0}
      - FEATURE_NEW_UI=false
      - FEATURE_DEBUG=false
    restart: always
    networks:
      - scm-network

  frontend:
    image: ${DOCKERHUB_USERNAME}/scm-frontend:${VERSION:-latest}
    ports:
      - "8081:80"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    restart: always
    networks:
      - scm-network

networks:
  scm-network:
    driver: bridge
