name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  BACKEND_IMAGE: scm-backend
  FRONTEND_IMAGE: scm-frontend

jobs:
  # Job 1: Build y tests básicos
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Backend - Install dependencies
      working-directory: ./backend
      run: npm install
    
    - name: Backend - Test (placeholder)
      working-directory: ./backend
      run: echo "✅ Tests passed"
    
    - name: Frontend - Install dependencies
      working-directory: ./frontend
      run: npm install
    
    - name: Frontend - Build
      working-directory: ./frontend
      run: npm run build
    
    - name: Frontend - Test (placeholder)
      working-directory: ./frontend
      run: echo "✅ Tests passed"

  # Job 2: Build y push de imágenes (solo en main)
  build-and-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Generate version
      id: version
      run: |
        COMMIT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        VERSION="v0.1.0-${COMMIT_SHA}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Generated version: ${VERSION}"
    
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
    
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }}
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
    
    - name: Output image info
      run: |
        echo "✅ Images built and pushed!"
        echo "Backend: ${{ secrets.DOCKERHUB_USERNAME }}/scm-backend:${{ steps.version.outputs.version }}"
        echo "Frontend: ${{ secrets.DOCKERHUB_USERNAME }}/scm-frontend:${{ steps.version.outputs.version }}"
