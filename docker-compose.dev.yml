services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - APP_VERSION=0.1.0
      - FEATURE_NEW_UI=false
      - FEATURE_DEBUG=false
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - scm-network

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - scm-network

networks:
  scm-network:
    driver: bridge
